<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Lab — staging only</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #f8fafc;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      width: 100%; max-width: 460px;
      background: rgba(17, 24, 39, 0.8); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 32px;
    }
    .tag {
      display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #fbbf24; background: rgba(251,191,36,0.12);
      padding: 4px 10px; border-radius: 999px; margin-bottom: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 22px; letter-spacing: -0.02em; }
    p { margin: 0 0 20px; color: #94a3b8; font-size: 14px; line-height: 1.55; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input[type="number"] {
      width: 100%; min-height: 46px; border-radius: 10px; padding: 0 14px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #f8fafc; font: 500 15px Inter, sans-serif; outline: none; margin-bottom: 14px;
    }
    input[type="number"]:focus { border-color: #2AABEE; box-shadow: 0 0 0 4px rgba(0,136,204,0.2); }
    button {
      width: 100%; min-height: 46px; border: none; cursor: pointer; border-radius: 10px;
      background: linear-gradient(135deg, #2AABEE, #0088cc); color: #fff;
      font: 600 15px Inter, sans-serif;
    }
    button:active { filter: brightness(0.95); }
    .log {
      margin-top: 18px; padding: 12px 14px; border-radius: 10px;
      background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.06);
      font: 12px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #94a3b8; white-space: pre-wrap; word-break: break-word;
      max-height: 220px; overflow-y: auto;
    }
    .log .ok { color: #34d399; }
    .log .err { color: #f87171; }
    a.results { display: inline-block; margin-top: 14px; color: #2AABEE; font-size: 14px; text-decoration: none; }
    a.results:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <span class="tag">Staging test lab</span>
    <h1>Test Lab Listening</h1>
    <p>Simulates a test page finishing. Submitting a score runs the exact same
       <code>IELTSTracker.sendResult()</code> call every real test page uses —
       anonymous sign-in, Firestore write, the lot. Staging never writes to the
       real Google Sheet.</p>

    <label for="score">Raw score (0–40)</label>
    <input id="score" type="number" min="0" max="40" step="0.5" value="32" />
    <button id="finish" type="button">Finish test → send result</button>

    <div class="log" id="log">Waiting…</div>
    <a class="results" id="meLink" href="me.html" target="_blank" rel="noopener">Open my results →</a>
  </div>

  <script src="js/tracker.js" defer></script>
  <script>
    'use strict';
    var logEl = document.getElementById('log');
    function log(msg, cls) {
      var line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = '· ' + msg;
      if (logEl.textContent === 'Waiting…') logEl.textContent = '';
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    document.getElementById('finish').addEventListener('click', function () {
      var score = Number(document.getElementById('score').value);
      log('sendResult("Test Lab Listening", ' + score + ')');
      window.IELTSTracker.sendResult('Test Lab Listening', score);

      // Round-trip verification: read the row back from Firestore.
      var t0 = Date.now();
      setTimeout(function () {
        if (!window.IHFirebase) { log('IHFirebase not loaded', 'err'); return; }
        window.IHFirebase.ready.then(function (fb) {
          if (!fb) { log('Firebase unavailable (see console)', 'err'); return; }
          if (!fb.user) { log('No user — is the Anonymous provider enabled?', 'err'); return; }
          log('signed in as uid ' + fb.user.uid.slice(0, 8) + '… (' + (fb.user.isAnonymous ? 'anonymous' : 'linked') + ')', 'ok');
          fb.db.collection('results').where('uid', '==', fb.user.uid).limit(50).get()
            .then(function (qs) {
              log('Firestore read-back: ' + qs.size + ' result(s) for this uid (' + (Date.now() - t0) + 'ms)', 'ok');
              var meLink = document.getElementById('meLink');
              meLink.href = 'me.html?uid=' + encodeURIComponent(fb.user.uid);
            })
            .catch(function (err) { log('read-back failed: ' + (err && err.code), 'err'); });
        });
      }, 2500);
    });
  </script>
</body>
</html>
